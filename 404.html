<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weiterleitung...</title>
    <link rel="icon" type="image/png" href="/zugeschnittenes_kreis_bild.png">
    <script>
        var REDIRECTS = [
            { path: "/dc",       url: "https://dsc.gg/glazesmp" },
            { path: "/discord",  url: "https://dsc.gg/glazesmp" },
        ];

        (function() {
            var path = window.location.pathname.replace(/\/+$/, '') || '/';
            for (var i = 0; i < REDIRECTS.length; i++) {
                var rp = REDIRECTS[i].path;
                if (rp.charAt(0) !== '/') rp = '/' + rp;
                if (path === rp) {
                    window.location.replace(REDIRECTS[i].url);
                    return;
                }
            }
        })();
    </script>
    <style>
        body {
            margin: 0;
            background: #010409;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
        <h1 style="font-size:5rem;color:#3b82f6;">404</h1>
        <p style="opacity:0.5;">Seite nicht gefunden</p>
        <a href="/" style="color:#3b82f6;text-decoration:underline;">Zur Startseite</a>
    </div>
</body>
</html>
