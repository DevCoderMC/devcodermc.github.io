<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weiterleitung...</title>
    <link rel="icon" type="image/png" href="/zugeschnittenes_kreis_bild.png">
    <style>
        body {
            margin: 0;
            background: #010409;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { opacity: 0.5; font-size: 14px; }
    </style>
</head>
<body>
    <div>
        <div class="spinner"></div>
        <p>Weiterleitung...</p>
    </div>
    <script src="/redirect.js"></script>
</body>
</html>
