<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weiterleitung...</title>
    <link rel="icon" type="image/png" href="/zugeschnittenes_kreis_bild.png">
    <style>
        body {
            margin: 0;
            background: #010409;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { opacity: 0.5; font-size: 14px; }
        .error { display: none; }
    </style>
</head>
<body>
    <div>
        <div class="spinner"></div>
        <p>Weiterleitung...</p>
        <p class="error" style="margin-top:20px;color:#ef4444;">Keine Weiterleitung gefunden</p>
    </div>
    <script>
    (async function() {
        var path = window.location.pathname.replace(/\/+$/, '') || '/';
        try {
            var res = await fetch('/redirects.json');
            var redirects = await res.json();
            for (var i = 0; i < redirects.length; i++) {
                var rp = redirects[i].path;
                if (rp.charAt(0) !== '/') rp = '/' + rp;
                if (path === rp) {
                    window.location.href = redirects[i].url;
                    return;
                }
            }
        } catch (e) {
            console.warn('Redirect-Fehler:', e);
        }
        document.querySelector('.spinner').style.display = 'none';
        document.querySelector('.error').style.display = 'block';
    })();
    </script>
</body>
</html>
