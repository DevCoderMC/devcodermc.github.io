<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weiterleitung...</title>
    <link rel="icon" type="image/png" href="/zugeschnittenes_kreis_bild.png">
    <style>
        body {
            margin: 0;
            background: #010409;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="spinner"></div>
        <p>Weiterleitung...</p>
    </div>
    <script>
        // >>> HIER TRÄGST DU DEINE WEITERLEITUNGEN EIN <<<
        var REDIRECTS = [
            { path: "/dc",          url: "https://dsc.gg/glazesmp" },
            { path: "/discord",     url: "https://dsc.gg/glazesmp" },
        ];

        (function() {
            var path = window.location.pathname.replace(/\/+$/, '') || '/';
            for (var i = 0; i < REDIRECTS.length; i++) {
                var rp = REDIRECTS[i].path;
                if (rp.charAt(0) !== '/') rp = '/' + rp;
                if (path === rp) {
                    window.location.href = REDIRECTS[i].url;
                    return;
                }
            }
            document.body.innerHTML = '<div style="text-align:center;margin-top:20vh"><h1 style="font-size:5rem;color:#3b82f6;">404</h1><p style="opacity:0.5;">Seite nicht gefunden</p><a href="/" style="color:#3b82f6;text-decoration:underline;">Zur Startseite</a></div>';
        })();
    </script>
</body>
</html>
